<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Annotation Tool</title>
<style>
:root {
  --bg:        #1e1e1e;
  --bg-item:   #2d2d2d;
  --bg-labeled:#1e3020;
  --bg-sel:    #1a3a5c;
  --bg-cur:    #0d6efd;
  --fg:        #e0e0e0;
  --fg-dim:    #888;
  --fg-label:  #7ecf7e;
  --accent:    #ffc857;
  --border:    #383838;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--fg); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; }

/* ── Top bar ── */
#topbar {
  background: #111;
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  min-height: 42px;
}
#topbar h1 { font-size: 13px; font-weight: 700; color: var(--fg); white-space: nowrap; }
#session-select {
  background: #3a3a3a; color: var(--fg);
  border: 1px solid #555; border-radius: 4px;
  padding: 4px 8px; font-size: 12px; cursor: pointer; max-width: 260px;
}
#progress-bar-wrap {
  display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0;
}
#progress-bar-bg {
  flex: 1; height: 6px; background: #444; border-radius: 3px; overflow: hidden; min-width: 60px;
}
#progress-bar-fill { height: 100%; background: #28a745; transition: width 0.3s; width: 0; }
#progress-text { font-size: 11px; color: var(--fg-dim); font-family: monospace; white-space: nowrap; }
#save-btn {
  background: #28a745; color: white; border: none;
  padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;
  white-space: nowrap; flex-shrink: 0;
}
#save-btn:hover { background: #218838; }
#save-status { font-size: 11px; color: var(--fg-dim); font-family: monospace; white-space: nowrap; }

/* ── Main layout ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Filmstrip (left) ── */
#filmstrip {
  width: 190px; flex-shrink: 0;
  background: var(--bg); border-right: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
}
#filmstrip::-webkit-scrollbar { width: 6px; }
#filmstrip::-webkit-scrollbar-track { background: #111; }
#filmstrip::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

.thumb-item {
  display: flex; gap: 5px; padding: 3px 5px;
  cursor: pointer; border-bottom: 1px solid #252525; align-items: center;
  transition: background 0.1s;
}
.thumb-item:hover { background: #383838 !important; }
.thumb-item.is-cur    { background: var(--bg-cur) !important; }
.thumb-item.is-labeled { background: var(--bg-labeled); }

.thumb-img {
  width: 72px; height: 46px; object-fit: cover;
  background: #333; flex-shrink: 0; border-radius: 2px; display: block;
}
.thumb-info { flex: 1; min-width: 0; }
.thumb-idx   { font-size: 9px;  color: var(--fg-dim); font-family: monospace; }
.thumb-name  { font-size: 9px;  color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thumb-label { font-size: 9px;  color: var(--fg-label); font-style: italic; min-height: 13px; }

/* ── Preview (center) ── */
#preview-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #111; overflow: hidden; position: relative;
}
#preview-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
#preview-placeholder { color: #444; font-size: 15px; text-align: center; line-height: 2; }

/* ── Right panel ── */
#right-panel {
  width: 200px; flex-shrink: 0;
  background: var(--bg); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#right-panel h2 {
  font-size: 11px; font-weight: 600; color: var(--fg-dim); text-transform: uppercase;
  letter-spacing: .05em; padding: 8px 10px 4px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#tags-list {
  flex: 1; overflow-y: auto; padding: 6px;
  display: flex; flex-direction: column; gap: 3px;
}
#tags-list::-webkit-scrollbar { width: 4px; }
#tags-list::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

.tag-btn {
  width: 100%; background: var(--bg-item); color: var(--fg);
  border: 1px solid transparent; border-radius: 4px;
  padding: 5px 8px; text-align: left; cursor: pointer;
  font-size: 12px; display: flex; align-items: center; gap: 6px;
  transition: background 0.1s, border-color 0.1s;
}
.tag-btn:hover { background: #3a3a3a; border-color: #555; }
.tag-btn.active { background: var(--bg-cur); border-color: var(--bg-cur); }
.tag-key {
  font-family: monospace; font-size: 10px; color: var(--accent);
  background: #3a3a3a; border: 1px solid #555;
  border-radius: 3px; padding: 0 4px; min-width: 18px; text-align: center;
}
.tag-btn.active .tag-key { background: rgba(255,255,255,0.2); border-color: transparent; }

/* manual label input area */
#manual-area {
  padding: 8px; border-top: 1px solid var(--border); flex-shrink: 0;
}
#manual-area label { font-size: 10px; color: var(--fg-dim); display: block; margin-bottom: 4px; }
#manual-row { display: flex; gap: 4px; }
#label-input {
  flex: 1; min-width: 0; background: #3a3a3a; color: white;
  border: 1px solid #555; border-radius: 4px; padding: 5px 7px; font-size: 12px;
}
#label-input:focus { outline: none; border-color: var(--bg-cur); }
#apply-btn {
  background: var(--bg-cur); color: white; border: none;
  border-radius: 4px; padding: 5px 9px; cursor: pointer; font-size: 11px; font-weight: 600;
}
#apply-btn:hover { background: #0b5ed7; }

/* ── Status bar ── */
#statusbar {
  background: #111; border-top: 1px solid var(--border);
  padding: 3px 10px; font-size: 11px; color: var(--fg-dim); font-family: monospace;
  flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Hint overlay ── */
#hint {
  position: fixed; bottom: 28px; right: 210px;
  font-size: 10px; color: #555; font-family: monospace; pointer-events: none;
  line-height: 1.6;
}
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>Image Annotation</h1>
  <select id="session-select"><option value="">— select session —</option></select>
  <div id="progress-bar-wrap">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <span id="progress-text">—</span>
  </div>
  <span id="save-status"></span>
  <button id="save-btn">Save  Ctrl+S</button>
  <a href="/verify" style="font-size:11px;color:#6ea8fe;text-decoration:none;padding:4px 8px;border:1px solid #444;border-radius:4px;white-space:nowrap;flex-shrink:0;">Verify Model</a>
  <a href="/browse" style="font-size:11px;color:#6ea8fe;text-decoration:none;padding:4px 8px;border:1px solid #444;border-radius:4px;white-space:nowrap;flex-shrink:0;">Browse</a>
</div>

<!-- Main -->
<div id="main">
  <!-- Filmstrip -->
  <div id="filmstrip"></div>

  <!-- Preview -->
  <div id="preview-wrap">
    <img id="preview-img" alt="preview">
    <div id="preview-placeholder">Select a session to begin<br><span style="font-size:12px;color:#555">Use arrow keys or click a frame</span></div>
  </div>

  <!-- Right panel -->
  <div id="right-panel">
    <h2>Labels</h2>
    <div id="tags-list"></div>
    <div id="manual-area">
      <label>Manual / unlisted:</label>
      <div id="manual-row">
        <input id="label-input" type="text" placeholder="label…" autocomplete="off">
        <button id="apply-btn">✓</button>
      </div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div id="statusbar">Ready — open a session to begin</div>

<!-- Keyboard hint -->
<div id="hint">← → navigate &nbsp;|&nbsp; 1–9 quick-label &nbsp;|&nbsp; Enter apply &nbsp;|&nbsp; Ctrl+S save</div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────
let session = null;
let images  = [];   // [{filename, label}]
let cur     = 0;
let tags    = [];
let dirty   = false;

// ── DOM refs ──────────────────────────────────────────────────────────────
const filmstrip     = document.getElementById('filmstrip');
const previewImg    = document.getElementById('preview-img');
const placeholder   = document.getElementById('preview-placeholder');
const labelInput    = document.getElementById('label-input');
const tagsList      = document.getElementById('tags-list');
const progressFill  = document.getElementById('progress-bar-fill');
const progressText  = document.getElementById('progress-text');
const statusbar     = document.getElementById('statusbar');
const saveStatus    = document.getElementById('save-status');
const sessionSelect = document.getElementById('session-select');

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  const [sessions, tagsData] = await Promise.all([
    apiFetch('/api/sessions'),
    apiFetch('/api/tags'),
  ]);
  tags = tagsData;
  buildTagButtons();

  sessions.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name;
    const pct = s.total ? Math.round(s.labeled / s.total * 100) : 0;
    opt.textContent = `${s.name}  (${s.labeled}/${s.total}, ${pct}%)`;
    sessionSelect.appendChild(opt);
  });
}

function buildTagButtons() {
  tagsList.innerHTML = '';
  tags.forEach((tag, i) => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.dataset.tag = tag;
    const keyStr = i < 9 ? String(i + 1) : i < 18 ? String.fromCharCode(97 + i - 9) : ''; // a-i for 10-18
    btn.innerHTML = `<span class="tag-key">${keyStr || '·'}</span>${tag}`;
    btn.addEventListener('click', () => quickApply(tag));
    tagsList.appendChild(btn);
  });
}

// ── Session loading ───────────────────────────────────────────────────────
sessionSelect.addEventListener('change', async () => {
  if (dirty && !confirm('有未保存的标注，是否切换会话？')) {
    sessionSelect.value = session || '';
    return;
  }
  const name = sessionSelect.value;
  if (!name) return;
  await loadSession(name);
});

async function loadSession(name) {
  session = name;
  setStatus('Loading…');
  images = await apiFetch(`/api/session/${encodeURIComponent(name)}/images`);
  cur = 0;
  dirty = false;
  buildFilmstrip();
  if (images.length) show(0);
  updateProgress();
  setStatus(`Loaded ${images.length} frames — ${name}`);
}

// ── Filmstrip ─────────────────────────────────────────────────────────────
let thumbObserver = null;

function buildFilmstrip() {
  if (thumbObserver) { thumbObserver.disconnect(); thumbObserver = null; }
  filmstrip.innerHTML = '';

  thumbObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const img = e.target.querySelector('.thumb-img');
      if (img && img.dataset.src) {
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
      }
      thumbObserver.unobserve(e.target);
    });
  }, { root: filmstrip, rootMargin: '300px' });

  const frag = document.createDocumentFragment();
  images.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'thumb-item' + (img.label ? ' is-labeled' : '');
    item.dataset.idx = i;
    const imgSrc = `/img/${encodeURIComponent(session)}/${encodeURIComponent(img.filename)}`;
    item.innerHTML = `
      <img class="thumb-img" data-src="${imgSrc}" alt="" loading="lazy">
      <div class="thumb-info">
        <div class="thumb-idx">#${i + 1}</div>
        <div class="thumb-name">${escHtml(img.filename)}</div>
        <div class="thumb-label">${escHtml(img.label || '')}</div>
      </div>`;
    item.addEventListener('click', () => show(i));
    frag.appendChild(item);
    thumbObserver.observe(item);
  });
  filmstrip.appendChild(frag);
  paintFilmstrip();
}

function paintFilmstrip() {
  filmstrip.querySelectorAll('.thumb-item').forEach((item, i) => {
    item.classList.toggle('is-cur',     i === cur);
    item.classList.toggle('is-labeled', i !== cur && !!images[i]?.label);
  });
}

function updateThumbLabel(idx) {
  const item = filmstrip.querySelector(`[data-idx="${idx}"]`);
  if (!item) return;
  item.querySelector('.thumb-label').textContent = images[idx].label || '';
}

function scrollToCur() {
  const item = filmstrip.querySelector(`[data-idx="${cur}"]`);
  if (item) item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── Preview ───────────────────────────────────────────────────────────────
function show(idx) {
  cur = idx;
  const img = images[idx];
  previewImg.src = `/img/${encodeURIComponent(session)}/${encodeURIComponent(img.filename)}`;
  previewImg.style.display = 'block';
  placeholder.style.display = 'none';
  labelInput.value = img.label || '';
  highlightActiveTag(img.label);
  paintFilmstrip();
  scrollToCur();
  setStatus(`[${idx + 1}/${images.length}]  ${img.filename}  |  label: ${img.label || '(none)'}`);
}

function highlightActiveTag(label) {
  tagsList.querySelectorAll('.tag-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tag === label);
  });
}

// ── Labeling ──────────────────────────────────────────────────────────────
function applyLabel() {
  if (!session || !images.length) return;
  const label = labelInput.value.trim();
  images[cur].label = label;
  updateThumbLabel(cur);
  paintFilmstrip();
  highlightActiveTag(label);
  updateProgress();
  dirty = true;
  scheduleSave();
  const next = cur + 1;
  if (next < images.length) show(next);
  setStatus(`Labeled '${label}'  —  ${labeledCount()}/${images.length} done`);
}

function quickApply(tag) {
  labelInput.value = tag;
  applyLabel();
}

// ── Auto-save (debounced 1.5 s) ───────────────────────────────────────────
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveStatus.textContent = 'unsaved…';
  saveTimer = setTimeout(saveAnnotations, 1500);
}

async function saveAnnotations() {
  if (!session) return;
  const payload = Object.fromEntries(images.map(img => [img.filename, img.label || '']));
  await apiFetch(`/api/session/${encodeURIComponent(session)}/annotate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  dirty = false;
  saveStatus.textContent = 'Saved ✓';
  setTimeout(() => { if (!dirty) saveStatus.textContent = ''; }, 2000);
}

// ── Progress ──────────────────────────────────────────────────────────────
function labeledCount() {
  return images.filter(i => i.label).length;
}

function updateProgress() {
  const n = labeledCount(), total = images.length;
  const pct = total ? Math.round(n / total * 100) : 0;
  progressFill.style.width = pct + '%';
  progressText.textContent = `${n}/${total} (${pct}%)`;
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────
// 1-9 → first 9 tags; a-i → tags 10-18
const KEY_MAP = {};
for (let i = 0; i < 9; i++)  KEY_MAP[String(i + 1)] = i;
for (let i = 0; i < 9; i++)  KEY_MAP[String.fromCharCode(97 + i)] = i + 9;

document.addEventListener('keydown', e => {
  if (e.target === labelInput) {
    if (e.key === 'Enter') { e.preventDefault(); applyLabel(); }
    return;
  }
  if (e.ctrlKey) {
    if (e.key === 's') { e.preventDefault(); saveAnnotations(); }
    return;
  }
  switch (e.key) {
    case 'ArrowRight': case 'ArrowDown':
      e.preventDefault(); if (cur + 1 < images.length) show(cur + 1); return;
    case 'ArrowLeft': case 'ArrowUp':
      e.preventDefault(); if (cur > 0) show(cur - 1); return;
    case 'Enter':
      applyLabel(); return;
  }
  const tagIdx = KEY_MAP[e.key];
  if (tagIdx !== undefined && tagIdx < tags.length) {
    quickApply(tags[tagIdx]);
  }
});

document.getElementById('apply-btn').addEventListener('click', applyLabel);
document.getElementById('save-btn').addEventListener('click', saveAnnotations);

window.addEventListener('beforeunload', e => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

// ── Utilities ─────────────────────────────────────────────────────────────
function setStatus(msg) { statusbar.textContent = msg; }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
async function apiFetch(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status} ${url}`);
  return r.json();
}

// ── Start ─────────────────────────────────────────────────────────────────
init().catch(err => setStatus('Error: ' + err.message));
</script>
</body>
</html>
