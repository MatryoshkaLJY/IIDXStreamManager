states:
  - id: IDLE
    description: "Cabinet is idle, showing attract mode"
    is_initial: true

  - id: ENTRY
    description: "Player has entered the game, showing entry animation"

  - id: MODESEL
    description: "Game entered mode selection"

  - id: LOGOUT
    description: "Player has exited the game, showing logout animation"

  - id: A_WAIT
    description: "Player is waiting for arena game to start"

  - id: A_SONGSEL
    description: "Player is selecting song for arena game"

  - id: A_CONFIRM
    description: "Player is confirming song for arena/battle game"

  - id: A_PLAY
    description: "Player is playing arena/battle game"

  - id: A_SCORE
    description: "Player is viewing score for an arena/battle round"

  - id: A_INTER
    description: "Player is in interlude between arena/battle rounds"

  - id: A_RANK
    description: "Player is viewing rank for arena game"

  - id: A_SUM
    description: "Player is viewing summary for arena game"

  - id: B_WAIT
    description: "Player is waiting for battle game to start"

  - id: B_MODESEL
    description: "Player is selecting mode for battle game"

  - id: B_SONGSEL
    description: "Player is selecting song for battle game"

  - id: B_RANK
    description: "Player is viewing rank for battle game"

  - id: B_CONFIRM
    description: "Player is confirming song for a battle game"

  - id: B_PLAY
    description: "Player is playing a battle game"

  - id: B_SCORE
    description: "Player is viewing score for a battle round"

  - id: B_INTER
    description: "Player is in interlude between battle rounds"

  - id: S_SONGSEL
    description: "Player is selecting song for standard game"

  - id: S_PLAY
    description: "Player is playing standard game"

  - id: S_SCORE
    description: "Player is viewing score for standard game"

  - id: S_DEATH
    description: "Player has failed a song in standard game"

  - id: S_INTER
    description: "Player is in interlude between songs in standard game"

  - id: D_SEL
    description: "Player is selecting Dan course"

  - id: D_PLAY
    description: "Player is playing Dan course"

  - id: D_SCORE_S
    description: "Player is viewing score after completing a song in Dan course"

  - id: D_SCORE_D
    description: "Player is viewing score after failing a song in Dan course"

  - id: D_DEATH
    description: "Player has failed a song in Dan course"

  - id: D_INTER_S
    description: "Player is in interlude after completing a song in Dan course"

  - id: D_INTER_D
    description: "Player is in interlude after failing a song in Dan course"

  - id: D_RANK
    description: "Player is viewing rank for Dan course"


# ==================== Variable Definitions ====================
variables:
  - name: arena_round
    description: "Arena mode round counter"
    type: integer
    initial_value: 0
    scope: global

  - name: battle_round
    description: "Battle mode round counter"
    type: integer
    initial_value: 0
    scope: global

  - name: std_song_count
    description: "Standard mode song count"
    type: integer
    initial_value: 0
    scope: global

  - name: std_retry_count
    description: "Standard mode retry count per song"
    type: integer
    initial_value: 0
    scope: global

  - name: dan_song_count
    description: "Dan mode song count"
    type: integer
    initial_value: 0
    scope: global

  - name: blank_counter
    description: "Consecutive blank event counter"
    type: integer
    initial_value: 0
    scope: global

  - name: play_type
    description: "Play mode type: 1=play1, 2=play2, 3=play12, 4=playd"
    type: integer
    initial_value: 0
    scope: global


# ==================== Event Definitions ====================
events:
  - idle          # Attract mode/standby screen
  - splash        # Boot splash screen
  - blank         # Black/blank screen
  - entry         # Player login/logout screen
  - pay           # Payment/credit screen
  - interlude     # Interlude/transition screen
  - modesel       # Mode selection screen
  - dansel        # Dan course selection screen
  - songsel       # Song selection screen
  - confirm       # Song confirmation screen
  - play1         # 1P gameplay screen
  - play2         # 2P gameplay screen
  - play12        # Versus gameplay screen (1P vs 2P)
  - playd         # Double play (DP) mode gameplay screen
  - bwait         # Battle mode waiting screen
  - bsel          # Battle mode selection screen
  - brank         # Battle mode ranking screen
  - death         # Stage failed screen
  - score         # Stage result/score screen
  - danscore      # Dan course result screen
  - lab           # Event mode screen
  - others        # Other/miscellaneous screens
  - await         # Arena mode waiting screen
  - aconfirm      # Arena mode confirmation screen
  - arank         # Arena mode ranking screen
  - asum          # Arena mode summary screen
  - set           # Settings screen


# ==================== Action Definitions ====================
actions:
  - name: enter_play_mode
    description: "Triggered when entering any PLAY state"

  - name: exit_play_mode
    description: "Triggered when exiting any PLAY state"

  - name: get_score
    description: "Triggered when entering any SCORE state"

  - name: inform_dan_pass
    description: "Triggered when passing Dan course"

  - name: inform_dan_fail
    description: "Triggered when failing Dan course"

  - name: init_arena_round
    description: "Initialize arena_round to 0"

  - name: increment_arena_round
    description: "Increment arena_round by 1"

  - name: init_battle_round
    description: "Initialize battle_round to 0"

  - name: increment_battle_round
    description: "Increment battle_round by 1"

  - name: init_std_song_count
    description: "Initialize std_song_count to 0"

  - name: increment_std_song_count
    description: "Increment std_song_count by 1"

  - name: init_std_retry_count
    description: "Initialize std_retry_count to 0"

  - name: increment_std_retry_count
    description: "Increment std_retry_count by 1"

  - name: init_dan_song_count
    description: "Initialize dan_song_count to 0"

  - name: increment_dan_song_count
    description: "Increment dan_song_count by 1"

  - name: init_all_counters
    description: "Initialize all mode counters to 0"

  - name: increment_blank_counter
    description: "Increment blank_counter by 1"

  - name: reset_blank_counter
    description: "Reset blank_counter to 0"

  - name: init_play_type
    description: "Initialize play_type to 0"

  - name: set_play_type_1
    description: "Set play_type to 1 (play1)"

  - name: set_play_type_2
    description: "Set play_type to 2 (play2)"

  - name: set_play_type_3
    description: "Set play_type to 3 (play12)"

  - name: set_play_type_4
    description: "Set play_type to 4 (playd)"


# ==================== State Transition Definitions ====================
transitions:
  # IDLE -> ENTRY: Player login
  - from: IDLE
    to: ENTRY
    event: entry
    guards: []
    actions:
      - type: init_all_counters
      - type: init_play_type

  # ENTRY -> MODESEL: Select game mode
  - from: ENTRY
    to: MODESEL
    event: modesel
    guards: []
    actions: []

  # LOGOUT -> IDLE: Return to standby
  - from: LOGOUT
    to: IDLE
    event: blank
    guards: []
    actions:
      - type: init_all_counters
      - type: init_play_type

  # ==================== Arena Mode State Transitions ====================
  # MODESEL -> A_WAIT: Enter arena waiting
  - from: MODESEL
    to: A_WAIT
    event: await
    guards: []
    actions:
      - type: init_arena_round

  # A_WAIT -> A_SONGSEL: Select song
  - from: A_WAIT
    to: A_SONGSEL
    event: songsel
    guards: []
    actions: []

  # A_SONGSEL -> A_CONFIRM: Confirm song
  - from: A_SONGSEL
    to: A_CONFIRM
    event: aconfirm
    guards: []
    actions:
      - type: increment_arena_round

  # A_CONFIRM -> A_PLAY: Start game (play1)
  - from: A_CONFIRM
    to: A_PLAY
    event: play1
    guards: []
    actions:
      - type: enter_play_mode
      - type: set_play_type_1

  # A_CONFIRM -> A_PLAY: Start game (play2)
  - from: A_CONFIRM
    to: A_PLAY
    event: play2
    guards: []
    actions:
      - type: enter_play_mode
      - type: set_play_type_2

  # A_CONFIRM -> A_PLAY: Start game (play12)
  - from: A_CONFIRM
    to: A_PLAY
    event: play12
    guards: []
    actions:
      - type: enter_play_mode
      - type: set_play_type_3

  # A_CONFIRM -> A_PLAY: Start game (playd)
  - from: A_CONFIRM
    to: A_PLAY
    event: playd
    guards: []
    actions:
      - type: enter_play_mode
      - type: set_play_type_4

  # A_PLAY -> A_SCORE: Game ended, show score
  - from: A_PLAY
    to: A_SCORE
    event: score
    guards: []
    actions:
      - type: exit_play_mode
      - type: get_score

  # A_SCORE -> A_INTER: Enter interlude
  - from: A_SCORE
    to: A_INTER
    event: interlude
    guards: []
    actions: []

  # A_INTER -> A_RANK: Show ranking
  - from: A_INTER
    to: A_RANK
    event: arank
    guards: []
    actions: []

  # A_RANK -> A_SUM: Show summary
  - from: A_RANK
    to: A_SUM
    event: asum
    guards: []
    actions: []

  # A_SUM -> LOGOUT: Logout
  - from: A_SUM
    to: LOGOUT
    event: entry
    guards: []
    actions: []

  # A_PLAY -> A_INTER: Game to interlude loop path
  - from: A_PLAY
    to: A_INTER
    event: interlude
    guards: []
    actions:
      - type: exit_play_mode

  # A_INTER -> A_CONFIRM: Interlude back to confirm loop path
  - from: A_INTER
    to: A_CONFIRM
    event: aconfirm
    guards: []
    actions:
      - type: increment_arena_round

  # ==================== Battle Mode State Transitions ====================
  # MODESEL -> B_WAIT: Enter battle waiting
  - from: MODESEL
    to: B_WAIT
    event: bwait
    guards: []
    actions:
      - type: init_battle_round

  # B_WAIT -> B_MODESEL: Select battle mode
  - from: B_WAIT
    to: B_MODESEL
    event: bsel
    guards: []
    actions: []

  # B_MODESEL -> B_SONGSEL: Select song
  - from: B_MODESEL
    to: B_SONGSEL
    event: songsel
    guards: []
    actions: []

  # B_SONGSEL -> B_CONFIRM: Confirm song
  - from: B_SONGSEL
    to: B_CONFIRM
    event: aconfirm
    guards: []
    actions:
      - type: increment_battle_round

  # B_CONFIRM -> B_PLAY: Start game (play1)
  - from: B_CONFIRM
    to: B_PLAY
    event: play1
    guards: []
    actions:
      - type: enter_play_mode
      - type: set_play_type_1

  # B_CONFIRM -> B_PLAY: Start game (play2)
  - from: B_CONFIRM
    to: B_PLAY
    event: play2
    guards: []
    actions:
      - type: enter_play_mode
      - type: set_play_type_2

  # B_CONFIRM -> B_PLAY: Start game (play12)
  - from: B_CONFIRM
    to: B_PLAY
    event: play12
    guards: []
    actions:
      - type: enter_play_mode
      - type: set_play_type_3

  # B_CONFIRM -> B_PLAY: Start game (playd)
  - from: B_CONFIRM
    to: B_PLAY
    event: playd
    guards: []
    actions:
      - type: enter_play_mode
      - type: set_play_type_4

  # B_PLAY -> B_SCORE: Game ended, show score
  - from: B_PLAY
    to: B_SCORE
    event: score
    guards: []
    actions:
      - type: exit_play_mode
      - type: get_score

  # B_SCORE -> B_INTER: Enter interlude
  - from: B_SCORE
    to: B_INTER
    event: interlude
    guards: []
    actions: []

  # B_INTER -> B_RANK: Show ranking
  - from: B_INTER
    to: B_RANK
    event: brank
    guards: []
    actions: []

  # B_RANK -> LOGOUT: Logout
  - from: B_RANK
    to: LOGOUT
    event: entry
    guards: []
    actions: []

  # B_PLAY -> B_INTER: Game to interlude loop path
  - from: B_PLAY
    to: B_INTER
    event: interlude
    guards: []
    actions:
      - type: exit_play_mode

  # B_INTER -> B_CONFIRM: Interlude back to confirm loop path
  - from: B_INTER
    to: B_CONFIRM
    event: aconfirm
    guards: []
    actions:
      - type: increment_battle_round

  # ==================== Standard Mode State Transitions ====================
  # MODESEL -> S_SONGSEL: Select standard mode song
  - from: MODESEL
    to: S_SONGSEL
    event: songsel
    guards: []
    actions:
      - type: init_std_song_count

  # S_SONGSEL -> S_PLAY: Start standard mode game (play1)
  - from: S_SONGSEL
    to: S_PLAY
    event: play1
    guards: []
    actions:
      - type: increment_std_song_count
      - type: init_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_1

  # S_SONGSEL -> S_PLAY: Start standard mode game (play2)
  - from: S_SONGSEL
    to: S_PLAY
    event: play2
    guards: []
    actions:
      - type: increment_std_song_count
      - type: init_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_2

  # S_SONGSEL -> S_PLAY: Start standard mode game (play12)
  - from: S_SONGSEL
    to: S_PLAY
    event: play12
    guards: []
    actions:
      - type: increment_std_song_count
      - type: init_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_3

  # S_SONGSEL -> S_PLAY: Start standard mode game (playd)
  - from: S_SONGSEL
    to: S_PLAY
    event: playd
    guards: []
    actions:
      - type: increment_std_song_count
      - type: init_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_4

  # S_PLAY -> S_INTER: Enter interlude
  - from: S_PLAY
    to: S_INTER
    event: interlude
    guards: []
    actions:
      - type: exit_play_mode

  # S_INTER -> LOGOUT: Logout
  - from: S_INTER
    to: LOGOUT
    event: entry
    guards: []
    actions: []

  # S_PLAY -> S_SCORE: Show score
  - from: S_PLAY
    to: S_SCORE
    event: score
    guards: []
    actions:
      - type: exit_play_mode
      - type: get_score

  # S_SCORE -> S_INTER: Score to interlude
  - from: S_SCORE
    to: S_INTER
    event: interlude
    guards: []
    actions: []

  # S_INTER -> S_PLAY: Interlude back to game (play1)
  - from: S_INTER
    to: S_PLAY
    event: play1
    guards: []
    actions:
      - type: increment_std_song_count
      - type: init_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_1

  # S_INTER -> S_PLAY: Interlude back to game (play2)
  - from: S_INTER
    to: S_PLAY
    event: play2
    guards: []
    actions:
      - type: increment_std_song_count
      - type: init_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_2

  # S_INTER -> S_PLAY: Interlude back to game (play12)
  - from: S_INTER
    to: S_PLAY
    event: play12
    guards: []
    actions:
      - type: increment_std_song_count
      - type: init_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_3

  # S_INTER -> S_PLAY: Interlude back to game (playd)
  - from: S_INTER
    to: S_PLAY
    event: playd
    guards: []
    actions:
      - type: increment_std_song_count
      - type: init_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_4

  # S_PLAY -> S_DEATH: Song failed
  - from: S_PLAY
    to: S_DEATH
    event: death
    guards: []
    actions:
      - type: exit_play_mode

  # S_DEATH -> S_PLAY: Continue after failure (retry) (play1)
  - from: S_DEATH
    to: S_PLAY
    event: play1
    guards: []
    actions:
      - type: increment_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_1

  # S_DEATH -> S_PLAY: Continue after failure (retry) (play2)
  - from: S_DEATH
    to: S_PLAY
    event: play2
    guards: []
    actions:
      - type: increment_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_2

  # S_DEATH -> S_PLAY: Continue after failure (retry) (play12)
  - from: S_DEATH
    to: S_PLAY
    event: play12
    guards: []
    actions:
      - type: increment_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_3

  # S_DEATH -> S_PLAY: Continue after failure (retry) (playd)
  - from: S_DEATH
    to: S_PLAY
    event: playd
    guards: []
    actions:
      - type: increment_std_retry_count
      - type: enter_play_mode
      - type: set_play_type_4

  # S_DEATH -> S_SCORE: Show score after failure
  - from: S_DEATH
    to: S_SCORE
    event: score
    guards: []
    actions:
      - type: get_score

  # S_DEATH -> S_INTER: Enter interlude after failure
  - from: S_DEATH
    to: S_INTER
    event: interlude
    guards: []
    actions: []

  # ==================== Dan Mode State Transitions ====================
  # MODESEL -> D_SEL: Select Dan course
  - from: MODESEL
    to: D_SEL
    event: dansel
    guards: []
    actions:
      - type: init_dan_song_count

  # D_SEL -> D_PLAY: Start Dan game (play1)
  - from: D_SEL
    to: D_PLAY
    event: play1
    guards: []
    actions:
      - type: increment_dan_song_count
      - type: enter_play_mode
      - type: set_play_type_1

  # D_SEL -> D_PLAY: Start Dan game (play2)
  - from: D_SEL
    to: D_PLAY
    event: play2
    guards: []
    actions:
      - type: increment_dan_song_count
      - type: enter_play_mode
      - type: set_play_type_2

  # D_SEL -> D_PLAY: Start Dan game (play12)
  - from: D_SEL
    to: D_PLAY
    event: play12
    guards: []
    actions:
      - type: increment_dan_song_count
      - type: enter_play_mode
      - type: set_play_type_3

  # D_SEL -> D_PLAY: Start Dan game (playd)
  - from: D_SEL
    to: D_PLAY
    event: playd
    guards: []
    actions:
      - type: increment_dan_song_count
      - type: enter_play_mode
      - type: set_play_type_4

  # D_PLAY -> D_INTER_S: Enter interlude after completing song
  - from: D_PLAY
    to: D_INTER_S
    event: interlude
    guards: []
    actions:
      - type: exit_play_mode

  # D_INTER_S -> D_RANK: Show Dan ranking (PASS)
  - from: D_INTER_S
    to: D_RANK
    event: danscore
    guards: []
    actions:
      - type: inform_dan_pass

  # D_INTER_S -> D_PLAY: Continue to next song after interlude (play1)
  - from: D_INTER_S
    to: D_PLAY
    event: play1
    guards: []
    actions:
      - type: increment_dan_song_count
      - type: enter_play_mode
      - type: set_play_type_1

  # D_INTER_S -> D_PLAY: Continue to next song after interlude (play2)
  - from: D_INTER_S
    to: D_PLAY
    event: play2
    guards: []
    actions:
      - type: increment_dan_song_count
      - type: enter_play_mode
      - type: set_play_type_2

  # D_INTER_S -> D_PLAY: Continue to next song after interlude (play12)
  - from: D_INTER_S
    to: D_PLAY
    event: play12
    guards: []
    actions:
      - type: increment_dan_song_count
      - type: enter_play_mode
      - type: set_play_type_3

  # D_INTER_S -> D_PLAY: Continue to next song after interlude (playd)
  - from: D_INTER_S
    to: D_PLAY
    event: playd
    guards: []
    actions:
      - type: increment_dan_song_count
      - type: enter_play_mode
      - type: set_play_type_4

  # D_RANK -> LOGOUT: Logout
  - from: D_RANK
    to: LOGOUT
    event: entry
    guards: []
    actions: []

  # D_PLAY -> D_SCORE_S: Show score after completing song
  - from: D_PLAY
    to: D_SCORE_S
    event: score
    guards: []
    actions:
      - type: exit_play_mode
      - type: get_score

  # D_SCORE_S -> D_INTER_S: Score to interlude
  - from: D_SCORE_S
    to: D_INTER_S
    event: interlude
    guards: []
    actions: []

  # D_PLAY -> D_DEATH: Song failed
  - from: D_PLAY
    to: D_DEATH
    event: death
    guards: []
    actions:
      - type: exit_play_mode

  # D_DEATH -> D_INTER_D: Enter interlude after failure
  - from: D_DEATH
    to: D_INTER_D
    event: interlude
    guards: []
    actions: []

  # D_DEATH -> D_SCORE_D: Show score after failure
  - from: D_DEATH
    to: D_SCORE_D
    event: score
    guards: []
    actions:
      - type: get_score

  # D_SCORE_D -> D_INTER_D: Failure score to interlude
  - from: D_SCORE_D
    to: D_INTER_D
    event: interlude
    guards: []
    actions: []

  # D_INTER_D -> D_RANK: Interlude to ranking after failure (FAIL)
  - from: D_INTER_D
    to: D_RANK
    event: danscore
    guards: []
    actions:
      - type: inform_dan_fail

  # ==================== Global State Transitions ====================
  # Any state -> IDLE on splash event (game restart/reset)
  - from: "*"
    to: IDLE
    event: splash
    guards: []
    actions:
      - type: init_all_counters
      - type: init_play_type

  # Global entry reset: Except IDLE, ENTRY, LOGOUT and its predecessor states,
  # all other states transition to IDLE on entry event
  - from: "*"
    to: IDLE
    event: entry
    guards:
      - type: not_in_states
        states: [IDLE, ENTRY, LOGOUT, A_SUM, B_RANK, S_INTER, D_RANK]
    actions:
      - type: init_all_counters
      - type: init_play_type

  # Global blank counter: Reset to IDLE after 5 consecutive blank events
  - from: "*"
    to: IDLE
    event: blank
    guards:
      - type: blank_counter_exceeded
        threshold: 5
    actions:
      - type: init_all_counters
      - type: init_play_type
      - type: reset_blank_counter

  # Non-blank event: Increment and check blank counter
  - from: "*"
    to: null  # Keep current state, no transition
    event: blank
    guards:
      - type: blank_counter_not_exceeded
        threshold: 5
    actions:
      - type: increment_blank_counter
