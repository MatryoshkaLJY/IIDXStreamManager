# ==================== 状态转换定义 ====================
transitions:
  # 格式：当前状态 -> 目标状态，触发事件，守卫条件，执行动作

  # 启动流程
  - from: SYSTEM_BOOT
    to: ATTRACT_MODE
    event: boot_complete
    guards: []
    actions:
      - action: play_startup_sound

  # 投币/刷卡流程
  - from: ATTRACT_MODE
    to: CREDIT_CHECK
    event: coin_inserted
    guards: []
    actions:
      - action: add_credit
        params: { amount: 1 }

  - from: ATTRACT_MODE
    to: CREDIT_CHECK
    event: card_swiped
    guards: []
    actions:
      - action: read_card_data

  - from: CREDIT_CHECK
    to: ATTRACT_MODE
    event: timeout
    guards:
      - condition: credits == 0
        description: "无信用点时返回待机"
    actions: []

  - from: CREDIT_CHECK
    to: MODE_SELECT
    event: start_pressed
    guards:
      - condition: credits >= 1 OR card_inserted == true
        description: "有足够的信用点或已插卡"
    actions:
      - action: consume_credit
        condition: card_inserted == false

  # 模式选择流程
  - from: MODE_SELECT
    to: MUSIC_SELECT
    event: mode_selected
    guards: []
    actions: []

  - from: MODE_SELECT
    to: ATTRACT_MODE
    event: back_pressed
    guards:
      - condition: elapsed_time > 30s
        description: "超时返回待机"
    actions:
      - action: refund_credit

  # 选曲流程
  - from: MUSIC_SELECT
    to: OPTIONS_SELECT
    event: song_confirmed
    guards: []
    actions: []

  - from: MUSIC_SELECT
    to: MODE_SELECT
    event: back_pressed
    guards: []
    actions: []

  - from: MUSIC_SELECT
    to: ATTRACT_MODE
    event: timeout
    guards:
      - condition: elapsed_time > 60s
    actions:
      - action: refund_credit

  # 选项设置流程
  - from: OPTIONS_SELECT
    to: STAGE_PREPARE
    event: options_confirmed
    guards: []
    actions: []

  - from: OPTIONS_SELECT
    to: MUSIC_SELECT
    event: back_pressed
    guards: []
    actions: []

  # 游戏流程
  - from: STAGE_PREPARE
    to: GAMEPLAY
    event: load_complete
    guards: []
    actions:
      - action: hide_loading_screen

  - from: STAGE_PREPARE
    to: SYSTEM_ERROR
    event: load_failed
    guards: []
    actions:
      - action: set_error_code
        params: { code: 1001, message: "Chart load failed" }

  - from: GAMEPLAY
    to: STAGE_RESULT
    event: song_finished
    guards: []
    actions:
      - action: finalize_score

  - from: GAMEPLAY
    to: STAGE_RESULT
    event: quit_pressed
    guards:
      - condition: is_at_break_point == true
        description: "只能在段落间隙退出"
    actions:
      - action: mark_as_failed

  - from: GAMEPLAY
    to: SYSTEM_ERROR
    event: hardware_error
    guards: []
    actions:
      - action: emergency_stop

  # 结果流程
  - from: STAGE_RESULT
    to: MUSIC_SELECT
    event: continue_pressed
    guards:
      - condition: current_stage < max_stages
        description: "还有剩余舞台"
    actions:
      - action: increment_stage

  - from: STAGE_RESULT
    to: COURSE_RESULT
    event: continue_pressed
    guards:
      - condition: current_stage >= max_stages
        description: "已完成所有舞台"
    actions: []

  - from: STAGE_RESULT
    to: NAME_ENTRY
    event: new_record
    guards:
      - condition: score > highscore_threshold
        description: "分数进入高分榜"
    actions: []

  - from: STAGE_RESULT
    to: ATTRACT_MODE
    event: timeout
    guards:
      - condition: elapsed_time > 30s
    actions: []

  # 整组结果流程
  - from: COURSE_RESULT
    to: NAME_ENTRY
    event: new_record
    guards:
      - condition: total_score > course_highscore
    actions: []

  - from: COURSE_RESULT
    to: ATTRACT_MODE
    event: any_key_pressed
    guards: []
    actions: []

  - from: COURSE_RESULT
    to: ATTRACT_MODE
    event: timeout
    guards:
      - condition: elapsed_time > 45s
    actions: []

  # 名字输入流程
  - from: NAME_ENTRY
    to: ATTRACT_MODE
    event: name_saved
    guards: []
    actions: []

  # 错误恢复
  - from: SYSTEM_ERROR
    to: SYSTEM_BOOT
    event: reset_pressed
    guards:
      - condition: is_recoverable == true
    actions:
      - action: clear_error
