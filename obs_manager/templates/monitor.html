<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIDX Game State Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #16213e;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2em;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.3);
        }

        header p {
            color: #888;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .panel h2 {
            font-size: 1.2em;
            color: #00d9ff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #0f3460;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: #0f3460;
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #00d9ff;
            color: #1a1a2e;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: #33e0ff;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.4);
        }

        .btn-success {
            background: #00ff88;
            color: #1a1a2e;
            font-weight: bold;
        }

        .btn-success:hover {
            background: #33ff99;
        }

        .btn-danger {
            background: #ff4757;
            color: #fff;
        }

        .btn-danger:hover {
            background: #ff6b7a;
        }

        .btn-secondary {
            background: #535c68;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #636e7a;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-running {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
            animation: pulse 2s infinite;
        }

        .status-stopped {
            background: #ff4757;
        }

        .status-pending {
            background: #ffa502;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .machine-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .machine-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .machine-card h3 {
            font-size: 1.1em;
            color: #00d9ff;
        }

        .machine-card .state {
            font-size: 0.9em;
            color: #ffa502;
            font-weight: bold;
        }

        .machine-card .info {
            font-size: 0.85em;
            color: #888;
        }

        .machine-card .scores {
            margin-top: 10px;
            padding: 10px;
            background: #1a1a2e;
            border-radius: 6px;
        }

        .score-item {
            display: inline-block;
            margin-right: 20px;
            font-family: monospace;
            font-size: 1.1em;
        }

        .score-label {
            color: #888;
            font-size: 0.8em;
        }

        .score-value {
            color: #00ff88;
            font-weight: bold;
        }

        .log-container {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85em;
        }

        .log-entry {
            padding: 4px 8px;
            border-left: 3px solid transparent;
            margin-bottom: 2px;
        }

        .log-entry:hover {
            background: #1a1a2e;
        }

        .log-timestamp {
            color: #666;
            margin-right: 10px;
        }

        .log-level {
            display: inline-block;
            padding: 0 6px;
            border-radius: 3px;
            font-size: 0.8em;
            margin-right: 10px;
            min-width: 50px;
            text-align: center;
        }

        .log-level-info {
            background: #3498db;
            color: #fff;
        }

        .log-level-success {
            background: #00ff88;
            color: #1a1a2e;
        }

        .log-level-warning {
            background: #ffa502;
            color: #1a1a2e;
        }

        .log-level-error {
            background: #ff4757;
            color: #fff;
        }

        .log-level-state {
            background: #9b59b6;
            color: #fff;
        }

        .log-level-score {
            background: #00d9ff;
            color: #1a1a2e;
        }

        .log-message {
            color: #ccc;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
        }

        .badge-success {
            background: #00ff88;
            color: #1a1a2e;
        }

        .badge-error {
            background: #ff4757;
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: #0f3460;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .alert-error {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid #ff4757;
            color: #ff4757;
        }

        .alert-info {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid #00d9ff;
            color: #00d9ff;
        }

        .hidden {
            display: none;
        }

        /* 分数历史表格 */
        .score-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .score-table th,
        .score-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }

        .score-table th {
            color: #00d9ff;
            font-weight: bold;
        }

        .score-table tr:hover {
            background: #0f3460;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00d9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 IIDX Game State Monitor</h1>
            <p>OBS 视频源实时监控 · 状态识别 · 自动分数捕获</p>
        </header>

        <!-- 状态和控制 -->
        <div class="panel" style="margin-bottom: 20px;">
            <div class="btn-group" style="justify-content: space-between; align-items: center;">
                <div>
                    <span class="status-indicator" id="monitorStatusIcon"></span>
                    <strong>监控状态:</strong> <span id="monitorStatusText">未启动</span>
                    <span style="margin-left: 20px; color: #888;">
                        机器数: <strong id="machineCount">0</strong>
                    </span>
                </div>
                <div class="btn-group">
                    <button class="btn-success" id="btnStart" onclick="startMonitor()">▶ 启动监控</button>
                    <button class="btn-danger" id="btnStop" onclick="stopMonitor()">⏹ 停止监控</button>
                    <button class="btn-secondary" onclick="saveConfig()">💾 保存配置</button>
                    <button class="btn-secondary" onclick="loadConfig()">📂 加载配置</button>
                </div>
            </div>
            <div id="alertContainer" style="margin-top: 15px;"></div>
        </div>

        <div class="grid">
            <!-- 配置面板 -->
            <div class="panel">
                <h2>⚙️ OBS 连接配置</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>主机地址</label>
                        <input type="text" id="obsHost" value="localhost" placeholder="localhost">
                    </div>
                    <div class="form-group">
                        <label>端口</label>
                        <input type="number" id="obsPort" value="4455" placeholder="4455">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码 (可选)</label>
                    <input type="password" id="obsPassword" placeholder="WebSocket 密码">
                </div>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="testObsConnection()">🔌 测试连接</button>
                    <button class="btn-secondary" onclick="updateObsConfig()">应用配置</button>
                </div>

                <h2 style="margin-top: 25px;">🤖 推理服务配置</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>状态识别主机</label>
                        <input type="text" id="stateInferHost" value="127.0.0.1">
                    </div>
                    <div class="form-group">
                        <label>状态识别端口</label>
                        <input type="number" id="stateInferPort" value="9876">
                    </div>
                </div>
                <div class="form-group">
                    <label>状态识别 Unix Socket (优先于 TCP)</label>
                    <input type="text" id="stateInferSocket" placeholder="/tmp/iidx_infer.sock">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>分数识别主机</label>
                        <input type="text" id="scoreInferHost" value="127.0.0.1">
                    </div>
                    <div class="form-group">
                        <label>分数识别端口</label>
                        <input type="number" id="scoreInferPort" value="9877">
                    </div>
                </div>

                <h2 style="margin-top: 25px;">📊 状态机配置</h2>
                <div class="form-group">
                    <label>状态机配置文件路径</label>
                    <input type="text" id="stateMachineConfig" placeholder="/path/to/state_machine.yaml">
                </div>
                <div class="form-group">
                    <label>轮询间隔 (秒)</label>
                    <input type="number" id="interval" value="1.0" step="0.1" min="0.1">
                </div>
                <button class="btn-primary" onclick="updateAllConfig()">更新所有配置</button>
            </div>

            <!-- 机器管理 -->
            <div class="panel">
                <h2>🕹️ 机器管理</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>机器 ID</label>
                        <input type="text" id="machineId" placeholder="如: cab1, cab2">
                    </div>
                    <div class="form-group">
                        <label>视频源名称</label>
                        <input type="text" id="sourceName" placeholder="如: video, kkm">
                    </div>
                </div>
                <button class="btn-primary" onclick="addMachine()">➕ 添加机器</button>

                <div id="machineList" style="margin-top: 20px;">
                    <div class="empty-state">
                        <p>暂无机器配置</p>
                    </div>
                </div>
            </div>

            <!-- 实时状态 -->
            <div class="panel">
                <h2>📈 实时状态</h2>
                <div id="statusContainer">
                    <div class="empty-state">
                        <p>监控未启动，暂无状态数据</p>
                    </div>
                </div>
            </div>

            <!-- 日志面板 -->
            <div class="panel" style="grid-column: 1 / -1;">
                <h2>📝 运行日志</h2>
                <div class="btn-group" style="margin-bottom: 15px;">
                    <button class="btn-secondary" onclick="refreshLogs()">🔄 刷新</button>
                    <button class="btn-secondary" onclick="clearLogs()">🗑️ 清空</button>
                    <select id="logFilter" onchange="refreshLogs()">
                        <option value="">所有级别</option>
                        <option value="info">信息</option>
                        <option value="success">成功</option>
                        <option value="warning">警告</option>
                        <option value="error">错误</option>
                        <option value="state">状态</option>
                        <option value="score">分数</option>
                    </select>
                </div>
                <div class="log-container" id="logContainer">
                    <div class="log-entry">
                        <span class="log-timestamp">--:--:--</span>
                        <span class="log-level log-level-info">INFO</span>
                        <span class="log-message">等待监控启动...</span>
                    </div>
                </div>
            </div>

            <!-- 分数历史 -->
            <div class="panel" style="grid-column: 1 / -1;">
                <h2>🏆 分数记录</h2>
                <div class="btn-group" style="margin-bottom: 15px;">
                    <button class="btn-secondary" onclick="refreshScores()">🔄 刷新</button>
                    <select id="scoreFilter" onchange="refreshScores()">
                        <option value="">所有机器</option>
                    </select>
                </div>
                <div style="max-height: 300px; overflow-y: auto;">
                    <table class="score-table" id="scoreTable">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>机器</th>
                                <th>状态</th>
                                <th>分数</th>
                            </tr>
                        </thead>
                        <tbody id="scoreTableBody">
                            <tr>
                                <td colspan="4" style="text-align: center; color: #666;">暂无分数记录</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let isRunning = false;
        let refreshInterval = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadInitialConfig();
            refreshMachineList();
            startAutoRefresh();
        });

        // 加载初始配置
        async function loadInitialConfig() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();

                document.getElementById('obsHost').value = config.obs_host || 'localhost';
                document.getElementById('obsPort').value = config.obs_port || 4455;
                document.getElementById('obsPassword').value = config.obs_password || '';
                document.getElementById('stateInferHost').value = config.state_infer_host || '127.0.0.1';
                document.getElementById('stateInferPort').value = config.state_infer_port || 9876;
                document.getElementById('stateInferSocket').value = config.state_infer_socket || '';
                document.getElementById('scoreInferHost').value = config.score_infer_host || '127.0.0.1';
                document.getElementById('scoreInferPort').value = config.score_infer_port || 9877;
                document.getElementById('stateMachineConfig').value = config.state_machine_config || '';
                document.getElementById('interval').value = config.interval || 1.0;
            } catch (error) {
                console.error('加载配置失败:', error);
            }
        }

        // 更新 OBS 配置
        function updateObsConfig() {
            updateAllConfig();
        }

        // 更新所有配置
        async function updateAllConfig() {
            const config = {
                obs_host: document.getElementById('obsHost').value,
                obs_port: parseInt(document.getElementById('obsPort').value),
                obs_password: document.getElementById('obsPassword').value,
                state_infer_host: document.getElementById('stateInferHost').value,
                state_infer_port: parseInt(document.getElementById('stateInferPort').value),
                state_infer_socket: document.getElementById('stateInferSocket').value,
                score_infer_host: document.getElementById('scoreInferHost').value,
                score_infer_port: parseInt(document.getElementById('scoreInferPort').value),
                state_machine_config: document.getElementById('stateMachineConfig').value,
                interval: parseFloat(document.getElementById('interval').value)
            };

            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                });
                const result = await response.json();
                if (result.ok) {
                    showAlert('配置已更新', 'success');
                }
            } catch (error) {
                showAlert('更新配置失败: ' + error.message, 'error');
            }
        }

        // 测试 OBS 连接
        async function testObsConnection() {
            const data = {
                host: document.getElementById('obsHost').value,
                port: parseInt(document.getElementById('obsPort').value),
                password: document.getElementById('obsPassword').value
            };

            showAlert('正在测试连接...', 'info');

            try {
                const response = await fetch('/api/test/obs', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.ok) {
                    showAlert(`连接成功! ${result.message}`, 'success');
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                showAlert('测试连接失败: ' + error.message, 'error');
            }
        }

        // 添加机器
        async function addMachine() {
            const machineId = document.getElementById('machineId').value.trim();
            const sourceName = document.getElementById('sourceName').value.trim();

            if (!machineId || !sourceName) {
                showAlert('请填写机器 ID 和视频源名称', 'error');
                return;
            }

            try {
                const response = await fetch('/api/machines', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({machine_id: machineId, source_name: sourceName})
                });
                const result = await response.json();

                if (result.ok) {
                    showAlert('机器添加成功', 'success');
                    document.getElementById('machineId').value = '';
                    document.getElementById('sourceName').value = '';
                    refreshMachineList();
                } else {
                    showAlert(result.error || '添加失败', 'error');
                }
            } catch (error) {
                showAlert('添加机器失败: ' + error.message, 'error');
            }
        }

        // 删除机器
        async function removeMachine(machineId) {
            if (!confirm(`确定要删除机器 ${machineId} 吗?`)) return;

            try {
                const response = await fetch(`/api/machines/${machineId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.ok) {
                    refreshMachineList();
                }
            } catch (error) {
                showAlert('删除机器失败: ' + error.message, 'error');
            }
        }

        // 刷新机器列表
        async function refreshMachineList() {
            try {
                const response = await fetch('/api/machines');
                const machines = await response.json();

                const container = document.getElementById('machineList');
                document.getElementById('machineCount').textContent = machines.length;

                // 更新分数过滤器
                const scoreFilter = document.getElementById('scoreFilter');
                const currentFilter = scoreFilter.value;
                scoreFilter.innerHTML = '<option value="">所有机器</option>';

                if (machines.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>暂无机器配置</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = machines.map(m => {
                    scoreFilter.innerHTML += `<option value="${m.machine_id}">${m.machine_id}</option>`;
                    return `
                        <div class="machine-card">
                            <div class="machine-card-header">
                                <h3>${m.machine_id}</h3>
                                <button class="btn-danger" style="padding: 5px 10px; font-size: 12px;"
                                        onclick="removeMachine('${m.machine_id}')">删除</button>
                            </div>
                            <div class="info">视频源: ${m.source_name}</div>
                        </div>
                    `;
                }).join('');

                scoreFilter.value = currentFilter;
            } catch (error) {
                console.error('刷新机器列表失败:', error);
            }
        }

        // 启动监控
        async function startMonitor() {
            try {
                const response = await fetch('/api/monitor/start', {
                    method: 'POST'
                });
                const result = await response.json();

                if (result.ok) {
                    isRunning = true;
                    updateMonitorStatus();
                    showAlert('监控已启动', 'success');
                } else {
                    showAlert(result.error || '启动失败', 'error');
                }
            } catch (error) {
                showAlert('启动监控失败: ' + error.message, 'error');
            }
        }

        // 停止监控
        async function stopMonitor() {
            try {
                const response = await fetch('/api/monitor/stop', {
                    method: 'POST'
                });
                const result = await response.json();

                if (result.ok) {
                    isRunning = false;
                    updateMonitorStatus();
                    showAlert('监控已停止', 'info');
                }
            } catch (error) {
                showAlert('停止监控失败: ' + error.message, 'error');
            }
        }

        // 更新监控状态显示
        async function updateMonitorStatus() {
            try {
                const response = await fetch('/api/monitor/status');
                const status = await response.json();

                isRunning = status.is_running;
                const icon = document.getElementById('monitorStatusIcon');
                const text = document.getElementById('monitorStatusText');
                const btnStart = document.getElementById('btnStart');
                const btnStop = document.getElementById('btnStop');

                if (isRunning) {
                    icon.className = 'status-indicator status-running';
                    text.textContent = '运行中';
                    btnStart.disabled = true;
                    btnStop.disabled = false;
                } else {
                    icon.className = 'status-indicator status-stopped';
                    text.textContent = '已停止';
                    btnStart.disabled = false;
                    btnStop.disabled = true;
                }

                document.getElementById('machineCount').textContent = status.machine_count;
            } catch (error) {
                console.error('获取监控状态失败:', error);
            }
        }

        // 刷新状态
        async function refreshStatus() {
            if (!isRunning) return;

            try {
                const response = await fetch('/api/status');
                const statuses = await response.json();

                const container = document.getElementById('statusContainer');
                const machineIds = Object.keys(statuses);

                if (machineIds.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>暂无机器状态数据</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = machineIds.map(id => {
                    const s = statuses[id];
                    const scoresHtml = s.last_scores ? Object.entries(s.last_scores)
                        .map(([k, v]) => `<div class="score-item"><span class="score-label">${k}:</span> <span class="score-value">${v}</span></div>`)
                        .join('') : '<span style="color: #666;">无分数数据</span>';

                    return `
                        <div class="machine-card">
                            <div class="machine-card-header">
                                <h3>${s.machine_id} ${s.is_active ? '<span class="badge badge-success">在线</span>' : '<span class="badge badge-error">离线</span>'}</h3>
                                <span class="state">${s.current_state}</span>
                            </div>
                            <div class="info">
                                源: ${s.source_name} |
                                最后标签: ${s.last_label || '-'} |
                                帧数: ${s.frame_count} |
                                分数次数: ${s.score_count}
                            </div>
                            ${s.last_scores ? `
                            <div class="scores">
                                ${scoresHtml}
                            </div>
                            ` : ''}
                            ${s.error_message ? `<div style="color: #ff4757; margin-top: 5px;">错误: ${s.error_message}</div>` : ''}
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('刷新状态失败:', error);
            }
        }

        // 刷新日志
        async function refreshLogs() {
            const level = document.getElementById('logFilter').value;
            const url = level ? `/api/logs?level=${level}&limit=100` : '/api/logs?limit=100';

            try {
                const response = await fetch(url);
                const logs = await response.json();

                const container = document.getElementById('logContainer');

                if (logs.length === 0) {
                    container.innerHTML = '<div class="log-entry"><span class="log-message" style="color: #666;">暂无日志</span></div>';
                    return;
                }

                container.innerHTML = logs.map(log => {
                    const time = new Date(log.timestamp).toLocaleTimeString();
                    return `
                        <div class="log-entry">
                            <span class="log-timestamp">${time}</span>
                            <span class="log-level log-level-${log.level}">${log.level.toUpperCase()}</span>
                            <span class="log-message">${escapeHtml(log.message)}</span>
                        </div>
                    `;
                }).join('');

                // 滚动到底部
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                console.error('刷新日志失败:', error);
            }
        }

        // 清空日志
        async function clearLogs() {
            try {
                await fetch('/api/logs/clear', {method: 'POST'});
                refreshLogs();
            } catch (error) {
                showAlert('清空日志失败: ' + error.message, 'error');
            }
        }

        // 刷新分数历史
        async function refreshScores() {
            const machineId = document.getElementById('scoreFilter').value;
            const url = machineId ? `/api/scores?machine_id=${machineId}&limit=50` : '/api/scores?limit=50';

            try {
                const response = await fetch(url);
                const scores = await response.json();

                const tbody = document.getElementById('scoreTableBody');

                if (scores.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #666;">暂无分数记录</td></tr>';
                    return;
                }

                tbody.innerHTML = scores.map(s => {
                    const time = new Date(s.timestamp).toLocaleTimeString();
                    const scoresText = s.scores ? Object.entries(s.scores)
                        .map(([k, v]) => `${k}: ${v}`)
                        .join(', ') : '-';
                    return `
                        <tr>
                            <td>${time}</td>
                            <td>${s.machine_id}</td>
                            <td>${s.state}</td>
                            <td style="font-family: monospace; color: #00ff88;">${scoresText}</td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('刷新分数失败:', error);
            }
        }

        // 保存配置到文件
        async function saveConfig() {
            try {
                // 先更新配置
                await updateAllConfig();

                const response = await fetch('/api/save_config', {
                    method: 'POST'
                });
                const result = await response.json();

                if (result.ok) {
                    showAlert('配置已保存到: ' + result.path, 'success');
                }
            } catch (error) {
                showAlert('保存配置失败: ' + error.message, 'error');
            }
        }

        // 从文件加载配置
        async function loadConfig() {
            try {
                const response = await fetch('/api/load_config', {
                    method: 'POST'
                });
                const result = await response.json();

                if (result.ok) {
                    showAlert('配置已加载', 'success');
                    loadInitialConfig();
                    refreshMachineList();
                } else {
                    showAlert(result.error || '加载失败', 'error');
                }
            } catch (error) {
                showAlert('加载配置失败: ' + error.message, 'error');
            }
        }

        // 显示提示
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 自动刷新
        function startAutoRefresh() {
            // 每秒更新状态
            setInterval(() => {
                updateMonitorStatus();
                refreshStatus();
            }, 1000);

            // 每 2 秒刷新日志
            setInterval(() => {
                if (isRunning) {
                    refreshLogs();
                }
            }, 2000);

            // 每 3 秒刷新分数记录
            setInterval(() => {
                if (isRunning) {
                    refreshScores();
                }
            }, 3000);
        }
    </script>
</body>
</html>
